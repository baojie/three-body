<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三体 Wiki</title>
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="#" class="brand">三体 Wiki</a>
    <form class="topnav-search" onsubmit="event.preventDefault();const v=this.q.value.trim();if(v)location.hash=encodeURIComponent(v);">
      <input id="topnav-q" name="q" type="search" placeholder="搜索页面…" autocomplete="off" list="topnav-pages">
      <datalist id="topnav-pages"></datalist>
    </form>
    <span id="crumb" class="crumb"></span>
    <span class="spacer"></span>
    <a href="#Special%3AAll" class="topnav-link">所有页面</a>
    <a href="#Special%3ARecent" class="topnav-link">最近修订</a>
    <a href="https://github.com/baojie/three-body" class="topnav-link" target="_blank" rel="noopener">GitHub</a>
    <span id="status" class="status"></span>
  </div>
</nav>

<main class="page" id="page-root">
  <aside class="sidebar" id="sidebar" hidden>
    <div class="infobox" id="infobox" hidden></div>
    <figure class="sidebar-portrait" id="sidebar-portrait" hidden></figure>
  </aside>
  <article id="article">
    <p class="loading">载入中…</p>
  </article>
</main>

<footer>
  <small>
    <span id="src-info"></span>
    <span id="broken-info"></span>
  </small>
</footer>

<script type="module" src="js/core.js?v=20260427a"></script>
<script>
fetch('pages.json').then(r=>r.json()).then(data=>{
  const dl = document.getElementById('topnav-pages');
  const pages = data.pages ? Object.values(data.pages) : [];
  pages.forEach(p=>{
    const o = document.createElement('option');
    o.value = p.label || p.id || '';
    dl.appendChild(o);
    (p.aliases||[]).forEach(a=>{
      if(typeof a === 'string'){
        const ao = document.createElement('option'); ao.value = a; dl.appendChild(ao);
      }
    });
  });
}).catch(()=>{});
</script>
</body>
</html>
